<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Fundo escuro com gradiente cyberpunk -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base do ícone arredondada (estilo app nativo) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#a78bfa" stroke-width="8" />
  
  <!-- Losango Central com Brilho Neon -->
  <path d="M256 96 L416 256 L256 416 L96 256 Z" 
        fill="none" 
        stroke="url(#strokeGrad)" 
        stroke-width="20" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#neonGlow)" />
</svg>
